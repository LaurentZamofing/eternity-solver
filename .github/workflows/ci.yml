name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # `mvn verify` runs: compile → test (slow group excluded by pom config) →
    # jacoco:report → jacoco:check (regression gate, LINE ≥ 20%, BRANCH ≥ 18%).
    # Failure here blocks the PR.
    - name: Build, test and enforce coverage gate
      run: mvn verify -B

    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v3
      continue-on-error: true
      with:
        files: ./target/site/jacoco/jacoco.xml
        fail_ci_if_error: false

    - name: Upload coverage report as CI artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-coverage-report
        path: target/site/jacoco/
        retention-days: 14

    - name: Upload JARs
      uses: actions/upload-artifact@v4
      with:
        name: eternity-solver-jar
        path: target/*.jar
        retention-days: 30

  slow-tests:
    # Runs the `@Tag("slow")` suite (full solver end-to-end). Non-blocking:
    # these tests spawn executor threads that don't always shut down cleanly,
    # so they're kept out of the main gate but still exercised on every push
    # to surface real regressions.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run slow tests
      run: mvn test -B -Dgroups=slow -DexcludedGroups= -DfailIfNoTests=false

  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Check wildcard imports
      run: |
        echo "Checking for inappropriate wildcard imports..."
        COUNT=$(grep -r 'import [a-z].*\.\*;' src/main/java --include='*.java' | \
          grep -v 'springframework\|jakarta\|static solver.visualization' | wc -l || echo "0")
        echo "Found: $COUNT wildcard imports"
        if [ "$COUNT" -gt "0" ]; then
          echo "⚠️ Warning: Wildcard imports found"
          exit 1
        fi

    - name: Check logging standards
      run: |
        echo "Checking for System.out/err usage..."
        # Exclude Javadoc examples (package-info.java) and the legitimate
        # cases: SolverLogger (the façade itself), visualization Formatters
        # and Renderers, DebugHelper, and FormattingUtils.printProgressBar
        # which uses \r + System.out.flush() to repaint a terminal line —
        # semantics a line-oriented logger can't reproduce.
        COUNT=$(grep -rn 'System\.\(out\|err\)\.print' src/main/java --include='*.java' | \
          grep -v 'package-info\.java\|SolverLogger\|Formatter\|Renderer\|Helper\|FormattingUtils' | \
          wc -l | tr -d ' ')
        echo "Found: $COUNT System.out/err calls"
        if [ "$COUNT" -gt "0" ]; then
          echo "⚠️ Direct System.out/err usage found — route through SolverLogger or whitelist the file."
          grep -rn 'System\.\(out\|err\)\.print' src/main/java --include='*.java' | \
            grep -v 'package-info\.java\|SolverLogger\|Formatter\|Renderer\|Helper\|FormattingUtils'
          exit 1
        fi

    - name: Report TODOs in production code
      run: |
        echo "Checking for TODO comments in main code..."
        COUNT=$(grep -r 'TODO\|FIXME' src/main/java --include='*.java' | wc -l || echo "0")
        echo "Found: $COUNT TODO/FIXME comments"
        # Informational only, doesn't fail the build.
